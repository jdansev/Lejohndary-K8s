apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-postgresql-pv-node1
spec:
  capacity:
    storage: 25Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: local-postgresql
  persistentVolumeReclaimPolicy: Retain
  local:
    path: /var/lib/local-pv/postgresql
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k8s-cp1
